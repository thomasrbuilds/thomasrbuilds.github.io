<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">IBM Post-Warning Investment Thesis</title>
  <desc id="desc">Professional investment-research dashboard showing IBM quarterly seasonality, free-cash-flow valuation scenarios and a conditional entry framework.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#102238"/>
      <stop offset="1" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142a43"/>
      <stop offset="1" stop-color="#0d1d30"/>
    </linearGradient>
    <linearGradient id="ibmBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f62fe"/>
      <stop offset="1" stop-color="#78a9ff"/>
    </linearGradient>
    <linearGradient id="aqua" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#42be65"/>
      <stop offset="1" stop-color="#77e0bd"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#28415e" stroke-width="1" opacity=".22"/>
    </pattern>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <circle cx="1110" cy="-20" r="300" fill="#0f62fe" opacity=".09"/>
  <circle cx="80" cy="740" r="260" fill="#42be65" opacity=".06"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="70" y="56" fill="#78a9ff" font-size="14" font-weight="800" letter-spacing="3">IBM · EQUITY RESEARCH</text>
    <text x="70" y="105" fill="#f4f7fb" font-size="42" font-weight="850">Post-Warning Investment Thesis</text>
    <text x="70" y="139" fill="#a9b4c5" font-size="17">Price structure, ten-year seasonality, scenario value and conditional entries</text>

    <g transform="translate(70 170)">
      <rect width="245" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">REFERENCE CLOSE</text>
      <text x="18" y="68" fill="#f4f7fb" font-size="32" font-weight="850">$219.05</text>
    </g>
    <g transform="translate(330 170)">
      <rect width="245" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">2025 FREE CASH FLOW</text>
      <text x="18" y="68" fill="#77e0bd" font-size="32" font-weight="850">$14.7B</text>
    </g>
    <g transform="translate(590 170)">
      <rect width="245" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">AVG Q4 REVENUE SHARE</text>
      <text x="18" y="68" fill="#78a9ff" font-size="32" font-weight="850">28.1%</text>
    </g>
    <g transform="translate(850 170)">
      <rect width="280" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">PROPOSED ENTRY ZONE</text>
      <text x="18" y="68" fill="#77e0bd" font-size="32" font-weight="850">$198–$163</text>
    </g>

    <g transform="translate(70 292)">
      <rect width="690" height="346" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".1"/>
      <text x="28" y="43" fill="#f4f7fb" font-size="24" font-weight="850">Illustrative free-cash-flow value bands</text>
      <text x="28" y="70" fill="#91a4ba" font-size="14">Scenario FCF × P/FCF multiple ÷ 0.9521B shares</text>

      <line x1="80" y1="286" x2="642" y2="286" stroke="#50657c" stroke-width="1"/>
      <line x1="308" y1="91" x2="308" y2="286" stroke="#f4f7fb" stroke-width="2" stroke-dasharray="7 7" opacity=".8"/>
      <text x="308" y="82" fill="#d8e0e9" font-size="11" font-weight="800" text-anchor="middle">$219 REFERENCE</text>

      <text x="42" y="130" fill="#c7d1dc" font-size="13" font-weight="800">BULL</text>
      <rect x="529" y="106" width="59" height="38" rx="9" fill="url(#aqua)"/>
      <text x="600" y="131" fill="#f4f7fb" font-size="17" font-weight="850">$286–304</text>

      <text x="42" y="194" fill="#c7d1dc" font-size="13" font-weight="800">BASE</text>
      <rect x="337" y="170" width="53" height="38" rx="9" fill="url(#ibmBlue)"/>
      <text x="402" y="195" fill="#f4f7fb" font-size="17" font-weight="850">$228–244</text>

      <text x="42" y="258" fill="#c7d1dc" font-size="13" font-weight="800">BEAR</text>
      <rect x="146" y="234" width="46" height="38" rx="9" fill="#fa4d56"/>
      <text x="204" y="259" fill="#f4f7fb" font-size="17" font-weight="850">$170–184</text>

      <text x="80" y="311" fill="#8fa2b8" font-size="11" text-anchor="middle">$150</text>
      <text x="245" y="311" fill="#8fa2b8" font-size="11" text-anchor="middle">$200</text>
      <text x="410" y="311" fill="#8fa2b8" font-size="11" text-anchor="middle">$250</text>
      <text x="575" y="311" fill="#8fa2b8" font-size="11" text-anchor="middle">$300</text>
    </g>

    <g transform="translate(790 292)">
      <rect width="340" height="346" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".1"/>
      <text x="24" y="43" fill="#f4f7fb" font-size="24" font-weight="850">Decision framework</text>

      <g transform="translate(24 68)">
        <rect width="292" height="76" rx="14" fill="#311d29" stroke="#7a3e50"/>
        <text x="17" y="27" fill="#ff8995" font-size="12" font-weight="850" letter-spacing="1">TECHNICAL DAMAGE</text>
        <text x="17" y="53" fill="#f4f7fb" font-size="15" font-weight="750">Trend break and failed reclaim</text>
      </g>

      <g transform="translate(24 158)">
        <rect width="292" height="76" rx="14" fill="#172b46" stroke="#315b8d"/>
        <text x="17" y="27" fill="#78a9ff" font-size="12" font-weight="850" letter-spacing="1">SEASONAL EVIDENCE</text>
        <text x="17" y="53" fill="#f4f7fb" font-size="15" font-weight="750">Q4 strongest in 10 of 10 years</text>
      </g>

      <g transform="translate(24 248)">
        <rect width="292" height="72" rx="14" fill="#12342f" stroke="#347d69"/>
        <text x="17" y="27" fill="#77e0bd" font-size="12" font-weight="850" letter-spacing="1">ENTRY DISCIPLINE</text>
        <text x="17" y="53" fill="#f4f7fb" font-size="16" font-weight="850">Scale only if FCF holds</text>
      </g>
    </g>

    <text x="70" y="684" fill="#758aa2" font-size="13">Frozen research snapshot: 17 Jul 2026 · Conditional thesis · Not investment advice</text>
    <text x="1130" y="684" fill="#758aa2" font-size="13" text-anchor="end">THOMASRBUILDS</text>
  </g>
</svg>
