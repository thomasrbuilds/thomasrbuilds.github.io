<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio risk and stress-testing engine preview</title>
  <desc id="desc">Dark professional dashboard showing risk concentration, drawdowns, stress scenarios and portfolio metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#10263d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142942"/>
      <stop offset="1" stop-color="#0d1e31"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="1050" cy="-40" r="310" fill="#42c99a" opacity=".07"/>
  <circle cx="50" cy="760" r="260" fill="#1261a0" opacity=".12"/>

  <g transform="translate(70 56)">
    <text x="0" y="0" fill="#77e0bd" font-family="Inter,Arial,sans-serif" font-size="14" font-weight="800" letter-spacing="3">PORTFOLIO ANALYTICS</text>
    <text x="0" y="52" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="42" font-weight="800">Risk &amp; Stress-Testing Engine</text>
    <text x="0" y="84" fill="#a9b4c5" font-family="Inter,Arial,sans-serif" font-size="17">Volatility, correlation, tail loss, concentration and regime failure</text>
  </g>

  <g transform="translate(70 170)" filter="url(#shadow)">
    <rect width="1060" height="480" rx="24" fill="url(#card)" stroke="#ffffff" stroke-opacity=".1"/>

    <g transform="translate(28 26)">
      <g>
        <rect width="187" height="82" rx="14" fill="#0a192b" stroke="#ffffff" stroke-opacity=".08"/>
        <text x="18" y="25" fill="#8fa2b8" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">ANNUALISED RETURN</text>
        <text x="18" y="62" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="800">21.6%</text>
      </g>
      <g transform="translate(202)">
        <rect width="187" height="82" rx="14" fill="#0a192b" stroke="#ffffff" stroke-opacity=".08"/>
        <text x="18" y="25" fill="#8fa2b8" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">VOLATILITY</text>
        <text x="18" y="62" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="800">23.9%</text>
      </g>
      <g transform="translate(404)">
        <rect width="187" height="82" rx="14" fill="#0a192b" stroke="#ffffff" stroke-opacity=".08"/>
        <text x="18" y="25" fill="#8fa2b8" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">MAX DRAWDOWN</text>
        <text x="18" y="62" fill="#ff6b76" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="800">-33.9%</text>
      </g>
      <g transform="translate(606)">
        <rect width="187" height="82" rx="14" fill="#0a192b" stroke="#ffffff" stroke-opacity=".08"/>
        <text x="18" y="25" fill="#8fa2b8" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">HISTORICAL VAR</text>
        <text x="18" y="62" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="800">7.9%</text>
      </g>
      <g transform="translate(808)">
        <rect width="196" height="82" rx="14" fill="#0a192b" stroke="#ffffff" stroke-opacity=".08"/>
        <text x="18" y="25" fill="#8fa2b8" font-family="Inter,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1">EXPECTED SHORTFALL</text>
        <text x="18" y="62" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="29" font-weight="800">11.2%</text>
      </g>
    </g>

    <g transform="translate(28 130)">
      <rect width="480" height="312" rx="16" fill="#0a192b" stroke="#ffffff" stroke-opacity=".08"/>
      <text x="20" y="32" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="750">Capital weight vs share of volatility</text>
      <text x="20" y="56" fill="#8fa2b8" font-family="Inter,Arial,sans-serif" font-size="12">BTC + MSTR: 25% of capital, 74.5% of volatility</text>
      <g font-family="Inter,Arial,sans-serif" font-size="12">
        <text x="22" y="94" fill="#c8d3df">BTC</text><rect x="92" y="81" width="70" height="14" rx="7" fill="#42c99a"/><rect x="172" y="81" width="156" height="14" rx="7" fill="#f28e2b"/><text x="344" y="94" fill="#8fa2b8">15% / 33%</text>
        <text x="22" y="132" fill="#c8d3df">MSTR</text><rect x="92" y="119" width="47" height="14" rx="7" fill="#42c99a"/><rect x="149" y="119" width="192" height="14" rx="7" fill="#f28e2b"/><text x="357" y="132" fill="#8fa2b8">10% / 41%</text>
        <text x="22" y="170" fill="#c8d3df">SPY</text><rect x="92" y="157" width="117" height="14" rx="7" fill="#42c99a"/><rect x="219" y="157" width="54" height="14" rx="7" fill="#5289b9"/><text x="289" y="170" fill="#8fa2b8">25% / 12%</text>
        <text x="22" y="208" fill="#c8d3df">QQQ</text><rect x="92" y="195" width="94" height="14" rx="7" fill="#42c99a"/><rect x="196" y="195" width="56" height="14" rx="7" fill="#5289b9"/><text x="268" y="208" fill="#8fa2b8">20% / 12%</text>
        <text x="22" y="246" fill="#c8d3df">GLD</text><rect x="92" y="233" width="47" height="14" rx="7" fill="#42c99a"/><rect x="149" y="233" width="5" height="14" rx="3" fill="#5289b9"/><text x="170" y="246" fill="#8fa2b8">10% / 1%</text>
        <text x="22" y="284" fill="#c8d3df">IEF + CASH</text><rect x="92" y="271" width="94" height="14" rx="7" fill="#42c99a"/><rect x="196" y="271" width="6" height="14" rx="3" fill="#5289b9"/><text x="218" y="284" fill="#8fa2b8">20% / 1%</text>
      </g>
    </g>

    <g transform="translate(526 130)">
      <rect width="478" height="148" rx="16" fill="#fff2cc"/>
      <text x="22" y="34" fill="#0b1f33" font-family="Inter,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1">CORE RISK CONCLUSION</text>
      <text x="22" y="67" fill="#0b1f33" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800">Separate ticker does not mean</text>
      <text x="22" y="91" fill="#0b1f33" font-family="Inter,Arial,sans-serif" font-size="17" font-weight="800">separate economic exposure.</text>
      <text x="22" y="121" fill="#4b5563" font-family="Inter,Arial,sans-serif" font-size="12">MSTR adds corporate risk around the same BTC factor.</text>
    </g>

    <g transform="translate(526 296)">
      <rect width="478" height="146" rx="16" fill="#0a192b" stroke="#ffffff" stroke-opacity=".08"/>
      <text x="20" y="31" fill="#f4f7fb" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="750">Selected stress losses</text>
      <g font-family="Inter,Arial,sans-serif" font-size="12">
        <text x="20" y="63" fill="#c8d3df">2008-style crash</text><rect x="210" y="52" width="194" height="12" rx="6" fill="#d1495b"/><text x="420" y="63" fill="#ff9aa3">-30.7%</text>
        <text x="20" y="94" fill="#c8d3df">2022 inflation shock</text><rect x="210" y="83" width="187" height="12" rx="6" fill="#d1495b"/><text x="413" y="94" fill="#ff9aa3">-29.6%</text>
        <text x="20" y="125" fill="#c8d3df">BTC falls 60%</text><rect x="210" y="114" width="133" height="12" rx="6" fill="#d1495b"/><text x="359" y="125" fill="#ff9aa3">-21.0%</text>
      </g>
    </g>
  </g>
</svg>

