<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Oracle AI Infrastructure Investment Case</title>
  <desc id="desc">Professional investment-research dashboard showing Oracle cloud growth, capital intensity, valuation scenarios and key risks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#102238"/>
      <stop offset="1" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#142a43"/>
      <stop offset="1" stop-color="#0d1d30"/>
    </linearGradient>
    <linearGradient id="oracleRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f80000"/>
      <stop offset="1" stop-color="#ff5a5a"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#42c99a"/>
      <stop offset="1" stop-color="#77e0bd"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#28415e" stroke-width="1" opacity=".22"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000814" flood-opacity=".42"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#grid)"/>
  <circle cx="1110" cy="-20" r="300" fill="#f80000" opacity=".07"/>
  <circle cx="80" cy="740" r="260" fill="#42c99a" opacity=".06"/>

  <g font-family="Inter,Segoe UI,Arial,sans-serif">
    <text x="70" y="56" fill="#ff5555" font-size="14" font-weight="800" letter-spacing="3">ORACLE · EQUITY RESEARCH</text>
    <text x="70" y="105" fill="#f4f7fb" font-size="42" font-weight="850">AI Infrastructure Investment Case</text>
    <text x="70" y="139" fill="#a9b4c5" font-size="17">Growth, leverage, dilution and technical risk through one auditable model</text>

    <g transform="translate(70 170)">
      <rect width="245" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">FY2026 OCI GROWTH</text>
      <text x="18" y="68" fill="#77e0bd" font-size="32" font-weight="850">+77%</text>
    </g>
    <g transform="translate(330 170)">
      <rect width="245" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">REMAINING OBLIGATIONS</text>
      <text x="18" y="68" fill="#f4f7fb" font-size="32" font-weight="850">$638B</text>
    </g>
    <g transform="translate(590 170)">
      <rect width="245" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">FY2026 CAPEX</text>
      <text x="18" y="68" fill="#ff6b76" font-size="32" font-weight="850">$55.7B</text>
    </g>
    <g transform="translate(850 170)">
      <rect width="280" height="92" rx="15" fill="#0b1b2e" stroke="#ffffff" stroke-opacity=".09"/>
      <text x="18" y="27" fill="#8fa2b8" font-size="11" font-weight="800" letter-spacing="1.2">FY2026 FREE CASH FLOW</text>
      <text x="18" y="68" fill="#ff6b76" font-size="32" font-weight="850">−$23.7B</text>
    </g>

    <g transform="translate(70 292)">
      <rect width="690" height="346" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".1"/>
      <text x="28" y="43" fill="#f4f7fb" font-size="24" font-weight="850">FY2030 scenario value from a $115 entry</text>
      <text x="28" y="70" fill="#91a4ba" font-size="14">Terminal value = scenario EPS × terminal P/E</text>

      <line x1="78" y1="283" x2="648" y2="283" stroke="#50657c" stroke-width="1"/>
      <line x1="78" y1="224" x2="648" y2="224" stroke="#77e0bd" stroke-width="2" stroke-dasharray="8 8" opacity=".9"/>

      <rect x="115" y="234" width="115" height="49" rx="9" fill="#e14b55"/>
      <rect x="289" y="171" width="115" height="112" rx="9" fill="#4d93d2"/>
      <rect x="463" y="105" width="115" height="178" rx="9" fill="url(#mint)"/>

      <text x="172" y="225" fill="#f4f7fb" font-size="23" font-weight="850" text-anchor="middle">$99</text>
      <text x="346" y="160" fill="#f4f7fb" font-size="23" font-weight="850" text-anchor="middle">$225</text>
      <text x="520" y="94" fill="#f4f7fb" font-size="23" font-weight="850" text-anchor="middle">$357</text>

      <text x="172" y="311" fill="#c7d1dc" font-size="14" font-weight="800" text-anchor="middle">BEAR</text>
      <text x="346" y="311" fill="#c7d1dc" font-size="14" font-weight="800" text-anchor="middle">BASE</text>
      <text x="520" y="311" fill="#c7d1dc" font-size="14" font-weight="800" text-anchor="middle">BULL</text>
      <text x="588" y="216" fill="#77e0bd" font-size="11" font-weight="800">$115 ENTRY</text>
    </g>

    <g transform="translate(790 292)">
      <rect width="340" height="346" rx="22" fill="url(#panel)" stroke="#ffffff" stroke-opacity=".1"/>
      <text x="24" y="43" fill="#f4f7fb" font-size="24" font-weight="850">Decision framework</text>

      <g transform="translate(24 68)">
        <rect width="292" height="76" rx="14" fill="#311d29" stroke="#7a3e50"/>
        <text x="17" y="27" fill="#ff8995" font-size="12" font-weight="850" letter-spacing="1">FUNDING BURDEN</text>
        <text x="17" y="53" fill="#f4f7fb" font-size="15" font-weight="750">$260B uncommenced leases</text>
      </g>

      <g transform="translate(24 158)">
        <rect width="292" height="76" rx="14" fill="#30291d" stroke="#755f35"/>
        <text x="17" y="27" fill="#ffca68" font-size="12" font-weight="850" letter-spacing="1">CONCENTRATION</text>
        <text x="17" y="53" fill="#f4f7fb" font-size="15" font-weight="750">OpenAI ≈ half of RPO*</text>
      </g>

      <g transform="translate(24 248)">
        <rect width="292" height="72" rx="14" fill="#12342f" stroke="#347d69"/>
        <text x="17" y="27" fill="#77e0bd" font-size="12" font-weight="850" letter-spacing="1">ENTRY DISCIPLINE</text>
        <text x="17" y="53" fill="#f4f7fb" font-size="16" font-weight="850">Scale—do not front-load</text>
      </g>
    </g>

    <text x="70" y="684" fill="#758aa2" font-size="13">Frozen research snapshot: 17 Jul 2026 · Reference entry: $115 · *S&amp;P estimate · Not investment advice</text>
    <text x="1130" y="684" fill="#758aa2" font-size="13" text-anchor="end">THOMASRBUILDS</text>
  </g>
</svg>
